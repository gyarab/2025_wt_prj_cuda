{% extends "app/base.html" %}

{% block title %}Assets{% endblock %}

{% block content %}
    <h1>Assets</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Symbol</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            {% for asset in assets %}
            <tr>
                <td>{{ asset.id }}</td>
                <td>{{ asset.symbol }}</td>
                <td>{{ asset.name }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Žádné assets nebyly nalezeny.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
