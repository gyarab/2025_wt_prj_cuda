{% extends "app/base.html" %}

{% block title %}Strategies{% endblock %}

{% block content %}
    <h1>Strategies</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            {% for strategy in strategies %}
            <tr>
                <td>{{ strategy.id }}</td>
                <td>{{ strategy.name }}</td>
                <td>{{ strategy.description }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Žádné strategie nebyly nalezeny.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
